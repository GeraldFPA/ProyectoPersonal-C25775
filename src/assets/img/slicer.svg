<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <rect width="800" height="500" fill="#1e1e2e" rx="15" />

  <text x="400" y="50" font-family="sans-serif" font-weight="bold" font-size="24" fill="#cdd6f4" text-anchor="middle">
    Proceso de Laminado (Slicing) para Impresión 3D
  </text>

  <g transform="translate(500, 380)">
    <path d="M 0 0 L 200 -100 L 0 -200 L -200 -100 Z" fill="#313244" stroke="#45475a" stroke-width="3" />
    <path d="M -100 -150 L 100 -50 M -50 -175 L 150 -75 M 50 -175 L -150 -75 M 100 -150 L -100 -50" stroke="#45475a" stroke-width="1.5" />
    <path d="M -150 -125 L 50 -25 M -50 -25 L 150 -125" stroke="#45475a" stroke-width="1.5" />
  </g>

  <g transform="translate(500, 340)">
    <path d="M 0 0 L 90 -45 L 0 -90 L -90 -45 Z" fill="#89b4fa" stroke="#89dceb" stroke-width="2" />
    <path d="M 0 -25 L 90 -70 L 0 -115 L -90 -70 Z" fill="#89b4fa" stroke="#89dceb" stroke-width="2" />
    <path d="M 0 -50 L 90 -95 L 0 -140 L -90 -95 Z" fill="#89b4fa" stroke="#89dceb" stroke-width="2" />
    <path d="M 0 -75 L 90 -120 L 0 -165 L -90 -120 Z" fill="#89b4fa" stroke="#89dceb" stroke-width="2" />

    <path d="M 0 -130 L 90 -175 L 0 -220 L -90 -175 Z" fill="#cba6f7" fill-opacity="0.8" stroke="#f5c2e7" stroke-width="2" />
    
    <path d="M -140 -160 L 140 -250 L 140 -190 L -140 -100 Z" fill="#a6e3a1" fill-opacity="0.2" stroke="#a6e3a1" stroke-width="2" stroke-dasharray="6" />
    
    <path d="M 0 -170 L 90 -215 L 0 -260 L -90 -215 Z" fill="none" stroke="#bac2de" stroke-width="2" stroke-dasharray="4" />
    <path d="M 0 -200 L 90 -245 L 0 -290 L -90 -245 Z" fill="none" stroke="#bac2de" stroke-width="2" stroke-dasharray="4" />
  </g>

  <g transform="translate(40, 150)" font-family="sans-serif">
    <rect width="260" height="200" fill="#313244" rx="10" stroke="#45475a" stroke-width="2" />
    
    <path d="M 0 10 C 0 4.477 4.477 0 10 0 L 250 0 C 255.523 0 260 4.477 260 10 L 260 40 L 0 40 Z" fill="#45475a" />
    <circle cx="20" cy="20" r="6" fill="#f38ba8" />
    <circle cx="40" cy="20" r="6" fill="#f9e2af" />
    <circle cx="60" cy="20" r="6" fill="#a6e3a1" />
    <text x="85" y="25" font-weight="bold" font-size="14" fill="#cdd6f4">Parámetros de Corte</text>
    
    <text x="20" y="70" font-size="13" fill="#a6adc8">Altura de capa:</text>
    <text x="240" y="70" font-size="13" font-weight="bold" fill="#89b4fa" text-anchor="end">0.20 mm</text>
    
    <text x="20" y="100" font-size="13" fill="#a6adc8">Densidad de relleno (Infill):</text>
    <text x="240" y="100" font-size="13" font-weight="bold" fill="#89b4fa" text-anchor="end">20%</text>

    <text x="20" y="130" font-size="13" fill="#a6adc8">Generar Soportes:</text>
    <rect x="200" y="117" width="40" height="20" rx="10" fill="#a6e3a1" />
    <circle cx="228" cy="127" r="8" fill="#1e1e2e" />

    <text x="20" y="165" font-size="12" fill="#cdd6f4">Procesando capas (G-Code)...</text>
    <rect x="20" y="175" width="220" height="8" rx="4" fill="#45475a" />
    <rect x="20" y="175" width="140" height="8" rx="4" fill="#cba6f7" />
  </g>

  <path d="M 300 250 C 350 250, 380 180, 500 180" fill="none" stroke="#f5c2e7" stroke-width="2" stroke-dasharray="5 5" />
  <circle cx="500" cy="180" r="4" fill="#f5c2e7" />
</svg>
